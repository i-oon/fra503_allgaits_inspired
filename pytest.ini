[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# -p no:<name>: skip ROS2 pytest plugins that bleed in from /opt/ros/humble and
# either miss deps (lark) or use stale hook names ('pytest_launch_collect_makemodule').
addopts = -v --tb=short -p no:launch_testing -p no:launch_ros
filterwarnings =
    ignore::DeprecationWarning
